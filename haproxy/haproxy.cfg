# ─────────────────────────────────────────────────────────────
# MediTrack — HAProxy configuration for external load balancer
# Environment: both (routes to prod + dev)
# Node: 172.31.26.112 (nfs-haproxy node)
# Phase: 2 — Kubernetes + Helm Implementation
# ─────────────────────────────────────────────────────────────

global
  log stdout format raw local0 info
  maxconn 50000
  nbthread 4
  tune.ssl.default-dh-param 2048
  ssl-default-bind-options ssl-min-ver TLSv1.2

defaults
  mode http
  option httplog
  option forwardfor
  option http-server-close
  timeout connect 5s
  timeout client 30s
  timeout server 30s
  timeout http-request 10s
  retries 3

frontend meditrack_http
  bind *:80
  redirect scheme https code 301

frontend meditrack_https
  bind *:443 ssl crt /etc/ssl/certs/meditrack.pem
  acl is_prod hdr(host) -i meditrack.prod.local
  acl is_dev  hdr(host) -i meditrack.dev.local
  use_backend k8s_prod if is_prod
  use_backend k8s_dev  if is_dev
  default_backend k8s_prod

backend k8s_prod
  balance roundrobin
  option httpchk GET /health
  server worker1 172.31.79.137:30080 check
  server worker2 172.31.28.90:30080 check

backend k8s_dev
  balance roundrobin
  option httpchk GET /health
  server worker1 172.31.79.137:30081 check
  server worker2 172.31.28.90:30081 check

frontend stats
  bind *:8404
  stats enable
  stats uri /stats
  stats refresh 10s
  stats admin if TRUE

frontend health_check
  bind *:8405
  monitor-uri /health
