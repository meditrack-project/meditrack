# ─────────────────────────────────────────────────────────────
# MediTrack — Application ConfigMap (non-sensitive config)
# Environment: both
# Namespace: meditrack-dev | meditrack-prod
# Phase: 2 — Kubernetes + Helm Implementation
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: meditrack-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "meditrack.labels" . | nindent 4 }}
data:
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  REDIS_URL: {{ .Values.config.redisUrl | quote }}
  MEDICAL_SERVICE_URL: {{ .Values.config.medicalServiceUrl | quote }}
  HEALTH_SERVICE_URL: {{ .Values.config.healthServiceUrl | quote }}
  USER_SERVICE_URL: {{ .Values.config.userServiceUrl | quote }}
  ALLOWED_ORIGINS: {{ .Values.config.allowedOrigins | quote }}
