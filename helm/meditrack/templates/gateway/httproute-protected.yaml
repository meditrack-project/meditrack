{{- if .Values.global.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: meditrack-protected-routes
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "meditrack.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: meditrack-gateway
      namespace: {{ .Values.global.namespace.infra }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth/me
        - path:
            type: PathPrefix
            value: /api/auth/logout
      backendRefs:
        - name: {{ .Values.global.userService.name }}
          port: {{ .Values.global.userService.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/medications
      backendRefs:
        - name: {{ .Values.global.medicalService.name }}
          port: {{ .Values.global.medicalService.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/symptoms
      backendRefs:
        - name: {{ .Values.global.healthService.name }}
          port: {{ .Values.global.healthService.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/visits
      backendRefs:
        - name: {{ .Values.global.healthService.name }}
          port: {{ .Values.global.healthService.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/ai
      backendRefs:
        - name: {{ .Values.global.aiService.name }}
          port: {{ .Values.global.aiService.port }}
{{- end }}
