# ─────────────────────────────────────────────────────────────
# MediTrack — Public HTTPRoutes (no JWT required)
# Environment: both
# Namespace: meditrack-dev | meditrack-prod
# Phase: 2 — Kubernetes + Helm Implementation
# ─────────────────────────────────────────────────────────────
{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: meditrack-public-routes
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "meditrack.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: meditrack-gateway
      namespace: {{ .Values.namespace.infra }}
  rules:
    # POST /api/auth/register
    - matches:
        - path:
            type: Exact
            value: /api/auth/register
          method: POST
      backendRefs:
        - name: {{ .Values.userService.name }}
          port: {{ .Values.userService.port }}
    # POST /api/auth/login
    - matches:
        - path:
            type: Exact
            value: /api/auth/login
          method: POST
      backendRefs:
        - name: {{ .Values.userService.name }}
          port: {{ .Values.userService.port }}
    # GET /api/auth/jwks
    - matches:
        - path:
            type: Exact
            value: /api/auth/jwks
          method: GET
      backendRefs:
        - name: {{ .Values.userService.name }}
          port: {{ .Values.userService.port }}
    # GET /* → frontend (catch-all, lowest priority)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.frontend.name }}
          port: {{ .Values.frontend.port }}
{{- end }}
