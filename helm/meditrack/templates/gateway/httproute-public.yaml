{{- if .Values.global.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: meditrack-public-routes
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "meditrack.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: meditrack-gateway
      namespace: {{ .Values.global.namespace.infra }}
  rules:
    - matches:
        - path:
            type: Exact
            value: /api/auth/register
          method: POST
      backendRefs:
        - name: {{ .Values.global.userService.name }}
          port: {{ .Values.global.userService.port }}
    - matches:
        - path:
            type: Exact
            value: /api/auth/login
          method: POST
      backendRefs:
        - name: {{ .Values.global.userService.name }}
          port: {{ .Values.global.userService.port }}
    - matches:
        - path:
            type: Exact
            value: /api/auth/jwks
          method: GET
      backendRefs:
        - name: {{ .Values.global.userService.name }}
          port: {{ .Values.global.userService.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.global.frontend.name }}
          port: {{ .Values.global.frontend.port }}
{{- end }}
