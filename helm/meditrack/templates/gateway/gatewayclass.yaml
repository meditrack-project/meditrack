# ─────────────────────────────────────────────────────────────
# MediTrack — GatewayClass linking to Envoy Gateway controller
# Environment: cluster-scoped
# Namespace: N/A
# Phase: 2 — Kubernetes + Helm Implementation
# ─────────────────────────────────────────────────────────────
{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gateway.className }}
  labels:
    {{- include "meditrack.labels" . | nindent 4 }}
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: meditrack-envoy-config
    namespace: {{ .Values.namespace.infra }}
{{- end }}
