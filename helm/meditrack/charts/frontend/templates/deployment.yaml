apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.global.frontend.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.global.frontend.name }}
    app.kubernetes.io/name: {{ .Values.global.frontend.name }}
    app.kubernetes.io/part-of: meditrack
    app.kubernetes.io/managed-by: helm
    environment: {{ .Values.global.environment }}
spec:
  replicas: {{ .Values.global.frontend.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.global.frontend.name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ .Values.global.frontend.name }}
        app.kubernetes.io/name: {{ .Values.global.frontend.name }}
        app.kubernetes.io/part-of: meditrack
        environment: {{ .Values.global.environment }}
    spec:
      serviceAccountName: meditrack-app-sa
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: {{ .Values.global.frontend.name }}
                topologyKey: kubernetes.io/hostname
      initContainers:
        {{- include "meditrack.initWait" (dict "name" "user-service" "port" "4001") | nindent 8 }}
      containers:
        - name: {{ .Values.global.frontend.name }}
          image: {{ .Values.global.registry }}/{{ .Values.global.frontend.image }}:{{ .Values.global.imageTag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.global.frontend.port }}
              protocol: TCP
          resources:
            requests:
              cpu: {{ .Values.global.frontend.resources.requests.cpu }}
              memory: {{ .Values.global.frontend.resources.requests.memory }}
            limits:
              cpu: {{ .Values.global.frontend.resources.limits.cpu }}
              memory: {{ .Values.global.frontend.resources.limits.memory }}
          startupProbe:
            httpGet:
              path: /
              port: {{ .Values.global.frontend.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.global.frontend.port }}
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.global.frontend.port }}
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          {{- include "meditrack.lifecycle" . | nindent 10 }}
          {{- include "meditrack.containerSecurityContext" . | nindent 10 }}
