apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.global.medicalService.name }}
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.global.medicalService.name }}
  ports:
    - port: {{ .Values.global.medicalService.port }}
      targetPort: {{ .Values.global.medicalService.port }}
