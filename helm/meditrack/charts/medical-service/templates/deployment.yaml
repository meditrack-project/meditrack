apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.global.medicalService.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.global.medicalService.name }}
    app.kubernetes.io/name: {{ .Values.global.medicalService.name }}
    app.kubernetes.io/part-of: meditrack
    app.kubernetes.io/managed-by: helm
    environment: {{ .Values.global.environment }}
spec:
  replicas: {{ .Values.global.medicalService.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.global.medicalService.name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ .Values.global.medicalService.name }}
        app.kubernetes.io/name: {{ .Values.global.medicalService.name }}
        app.kubernetes.io/part-of: meditrack
        environment: {{ .Values.global.environment }}
    spec:
      serviceAccountName: meditrack-app-sa
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: {{ .Values.global.medicalService.name }}
                topologyKey: kubernetes.io/hostname
      initContainers:
        {{- include "meditrack.initWait" (dict "name" "medical-db" "port" "5432") | nindent 8 }}
        {{- include "meditrack.initWait" (dict "name" "redis" "port" "6379") | nindent 8 }}
      containers:
        - name: {{ .Values.global.medicalService.name }}
          image: {{ .Values.global.registry }}/{{ .Values.global.medicalService.image }}:{{ .Values.global.imageTag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.global.medicalService.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: meditrack-config
          env:
            - name: PORT
              value: {{ .Values.global.medicalService.port | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: meditrack-db-secrets
                  key: MEDICAL_DB_URL
          resources:
            requests:
              cpu: {{ .Values.global.medicalService.resources.requests.cpu }}
              memory: {{ .Values.global.medicalService.resources.requests.memory }}
            limits:
              cpu: {{ .Values.global.medicalService.resources.limits.cpu }}
              memory: {{ .Values.global.medicalService.resources.limits.memory }}
          {{- include "meditrack.appProbes" (dict "port" .Values.global.medicalService.port) | nindent 10 }}
          {{- include "meditrack.lifecycle" . | nindent 10 }}
          {{- include "meditrack.containerSecurityContext" . | nindent 10 }}
