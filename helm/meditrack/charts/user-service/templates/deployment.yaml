# ─────────────────────────────────────────────────────────────
# MediTrack — user-service Deployment
# Environment: both
# Namespace: meditrack-dev | meditrack-prod
# Phase: 2 — Kubernetes + Helm Implementation
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.userService.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "user-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.userService.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.userService.name }}
  {{- include "meditrack.deploymentStrategy" . | nindent 2 }}
  template:
    metadata:
      labels:
        {{- include "user-service.labels" . | nindent 8 }}
    spec:
      serviceAccountName: meditrack-app-sa
      terminationGracePeriodSeconds: 30
      {{- include "meditrack.appSecurityContext" . | nindent 6 }}
      {{- include "meditrack.podAntiAffinity" (dict "name" .Values.userService.name) | nindent 6 }}
      initContainers:
        {{- include "meditrack.initWait" (dict "name" "user-db" "port" "5432") | nindent 8 }}
      containers:
        - name: {{ .Values.userService.name }}
          image: {{ include "meditrack.image" (dict "registry" .Values.global.registry "image" .Values.userService.image "tag" .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.userService.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: meditrack-config
          env:
            - name: PORT
              value: {{ .Values.userService.port | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: meditrack-db-secrets
                  key: USER_DB_URL
            - name: JWT_PRIVATE_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: meditrack-jwt-keys
                  key: JWT_PRIVATE_KEY_B64
            - name: JWT_PUBLIC_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: meditrack-jwt-keys
                  key: JWT_PUBLIC_KEY_B64
          resources:
            requests:
              cpu: {{ .Values.userService.resources.requests.cpu }}
              memory: {{ .Values.userService.resources.requests.memory }}
            limits:
              cpu: {{ .Values.userService.resources.limits.cpu }}
              memory: {{ .Values.userService.resources.limits.memory }}
          {{- include "meditrack.appProbes" (dict "port" .Values.userService.port) | nindent 10 }}
          {{- include "meditrack.lifecycle" . | nindent 10 }}
          {{- include "meditrack.containerSecurityContext" . | nindent 10 }}
