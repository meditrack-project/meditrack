apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.global.userService.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.global.userService.name }}
    app.kubernetes.io/name: {{ .Values.global.userService.name }}
    app.kubernetes.io/part-of: meditrack
    app.kubernetes.io/managed-by: helm
    environment: {{ .Values.global.environment }}
spec:
  replicas: {{ .Values.global.userService.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.global.userService.name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ .Values.global.userService.name }}
        app.kubernetes.io/name: {{ .Values.global.userService.name }}
        app.kubernetes.io/part-of: meditrack
        environment: {{ .Values.global.environment }}
    spec:
      serviceAccountName: meditrack-app-sa
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: {{ .Values.global.userService.name }}
                topologyKey: kubernetes.io/hostname
      initContainers:
        {{- include "meditrack.initWait" (dict "name" "user-db" "port" "5432") | nindent 8 }}
      containers:
        - name: {{ .Values.global.userService.name }}
          image: {{ .Values.global.registry }}/{{ .Values.global.userService.image }}:{{ .Values.global.imageTag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.global.userService.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: meditrack-config
          env:
            - name: PORT
              value: {{ .Values.global.userService.port | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: meditrack-db-secrets
                  key: USER_DB_URL
            - name: JWT_PRIVATE_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: meditrack-jwt-keys
                  key: JWT_PRIVATE_KEY_B64
            - name: JWT_PUBLIC_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: meditrack-jwt-keys
                  key: JWT_PUBLIC_KEY_B64
          resources:
            requests:
              cpu: {{ .Values.global.userService.resources.requests.cpu }}
              memory: {{ .Values.global.userService.resources.requests.memory }}
            limits:
              cpu: {{ .Values.global.userService.resources.limits.cpu }}
              memory: {{ .Values.global.userService.resources.limits.memory }}
          {{- include "meditrack.appProbes" (dict "port" .Values.global.userService.port) | nindent 10 }}
          {{- include "meditrack.lifecycle" . | nindent 10 }}
          {{- include "meditrack.containerSecurityContext" . | nindent 10 }}
