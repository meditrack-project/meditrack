apiVersion: apps/v1
kind: Deployment
metadata:
  name: haproxy
  namespace: {{ .Values.global.namespace.infra }}
  labels:
    app: haproxy
    app.kubernetes.io/name: haproxy
spec:
  replicas: {{ .Values.global.haproxy.replicas }}
  selector:
    matchLabels:
      app: haproxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: haproxy
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: haproxy
          image: haproxy:2.8-alpine
          ports:
            - containerPort: 80
              protocol: TCP
            - containerPort: 443
              protocol: TCP
            - containerPort: 8404
              protocol: TCP
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
              readOnly: true
          resources:
            requests:
              cpu: {{ .Values.global.haproxy.resources.requests.cpu }}
              memory: {{ .Values.global.haproxy.resources.requests.memory }}
            limits:
              cpu: {{ .Values.global.haproxy.resources.limits.cpu }}
              memory: {{ .Values.global.haproxy.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8405
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8405
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: haproxy-config
          configMap:
            name: haproxy-config
