{{- if .Values.healthService.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Values.healthService.name }}-pdb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "health-service.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.healthService.pdb.minAvailable }}
  selector:
    matchLabels:
      app: {{ .Values.healthService.name }}
{{- end }}
