apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.medicalDb.name }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "medical-db.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: {{ .Values.medicalDb.name }}
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.medicalDb.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "medical-db.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.medicalDb.name }}
  ports:
    - port: 5432
      targetPort: 5432
