apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.healthDb.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "health-db.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ .Values.healthDb.name }}-headless
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: {{ .Values.healthDb.name }}
  template:
    metadata:
      labels:
        {{- include "health-db.labels" . | nindent 8 }}
    spec:
      serviceAccountName: meditrack-db-sa
      terminationGracePeriodSeconds: 60
      {{- include "meditrack.dbSecurityContext" . | nindent 6 }}
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /var/lib/postgresql/data/pgdata
              chown -R 999:999 /var/lib/postgresql/data
              chmod 700 /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.healthDb.dbName }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: meditrack-db-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: meditrack-db-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: {{ .Values.healthDb.resources.requests.cpu }}
              memory: {{ .Values.healthDb.resources.requests.memory }}
            limits:
              cpu: {{ .Values.healthDb.resources.limits.cpu }}
              memory: {{ .Values.healthDb.resources.limits.memory }}
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          {{- include "meditrack.containerSecurityContext" . | nindent 10 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: {{ .Values.nfs.storageClass }}
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.healthDb.storage }}
